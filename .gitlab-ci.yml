image: docker:24.0.7

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "ue5-dev"
    - if: $CI_COMMIT_BRANCH == "ue5-ika"
    - if: $CI_PIPELINE_SOURCE == "web"

variables:
  DOCKER_BUILDKIT: "1"
  GIT_SUBMODULE_STRATEGY: recursive
  UBUNTU_DISTRO: "22.04"
  UE5_BRANCH: "ue5-dev-carla"
  UE_VOLUME: "carla-ue5-engine-22.04"
  CARLA_CONTENT_BRANCH: "ue5"
  carla_version: "0.10.0"
  image_carla_release: "$CI_REGISTRY_IMAGE/carla-$carla_version:release"
  image_carla_client: "$CI_REGISTRY_IMAGE/carla-$carla_version:client"
  image_publish_postfix: ci
  CARLA_SRC_VOLUME: "carla-src-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_ID}"
  CARLA_DOCKER_UID: "1000"
  CARLA_DOCKER_GID: "1000"
  CARLA_DOCKER_GROUP_GID: "999"

stages:
  - Build Builder Image
  - Install Unreal Engine
  - Build Carla
  - Build Release Docker Image
  - Build Client Docker Image
  - Push Docker Images
  - Clean Up

.build:
  dependencies: []
  interruptible: true
  tags:
    - rhea1
    - gpu
  artifacts:
    name: "$CI_JOB_NAME"
    when: always
    paths:
      - $log_file

.docker-run-ue5:
  variables:
    DOCKER_RUN_FLAGS: "--net=host"

build-builder-image:
  stage: Build Builder Image
  extends: .build
  needs: []
  before_script:
    - apk add --no-cache bash
  script:
    - |
      HOST_UID="$(id -u)"
      HOST_GID="$(id -g)"
      if [ "$HOST_UID" = "0" ]; then
        HOST_UID="$CARLA_DOCKER_UID"
        HOST_GID="$CARLA_DOCKER_GID"
      fi

      DOCKER_GROUP_GID="$(getent group docker | cut -d: -f3 || true)"
      if [ -z "$DOCKER_GROUP_GID" ]; then
        DOCKER_GROUP_GID="$CARLA_DOCKER_GROUP_GID"
      fi

      bash Util/Docker/build.sh \
        --ubuntu-distro "$UBUNTU_DISTRO" \
        --user "${HOST_UID}:${HOST_GID}" \
        --docker-gid "$DOCKER_GROUP_GID" \
        > build_log_builder.txt 2>&1
  variables:
    log_file: build_log_builder.txt

install-unreal-engine:
  stage: Install Unreal Engine
  extends:
    - .build
    - .docker-run-ue5
  needs: ["build-builder-image"]
  resource_group: ue5-engine
  script:
    - docker volume create "$UE_VOLUME"
    - |
      docker run --rm \
        --user root \
        --volume "$UE_VOLUME:/workspaces/unreal-engine" \
        carla-development:ue5-${UBUNTU_DISTRO} \
        bash -eo pipefail -c "chown -R ${CARLA_DOCKER_UID}:${CARLA_DOCKER_GID} /workspaces/unreal-engine"
    - |
      docker run --rm -i \
        $DOCKER_RUN_FLAGS \
        --env=GITHUB_USERNAME="$GITHUB_USERNAME" \
        --env=GITHUB_ACCESS_TOKEN="$GITHUB_ACCESS_TOKEN" \
        --env=UE5_BRANCH="$UE5_BRANCH" \
        --env=NVIDIA_VISIBLE_DEVICES=all \
        --env=NVIDIA_DRIVER_CAPABILITIES=all \
        --volume "$UE_VOLUME:/workspaces/unreal-engine" \
        --user carla \
        carla-development:ue5-${UBUNTU_DISTRO} \
        bash -eo pipefail > build_log_unreal.txt 2>&1 <<'EOF'
      cd /workspaces

      if [ -x /workspaces/unreal-engine/Engine/Binaries/Linux/UnrealEditor ]; then
        echo "Unreal Engine already installed at /workspaces/unreal-engine."
        exit 0
      fi

      if [ -z "${GITHUB_USERNAME}" ] || [ -z "${GITHUB_ACCESS_TOKEN}" ]; then
        echo "Missing GITHUB_USERNAME/GITHUB_ACCESS_TOKEN for Unreal Engine clone."
        exit 1
      fi

      if [ ! -d unreal-engine/.git ]; then
        rm -rf unreal-engine/* unreal-engine/.[!.]* unreal-engine/..?*
        git clone -b "${UE5_BRANCH}" "https://${GITHUB_USERNAME}:${GITHUB_ACCESS_TOKEN}@github.com/CarlaUnreal/UnrealEngine.git" unreal-engine
      else
        git -C unreal-engine fetch origin "${UE5_BRANCH}"
        git -C unreal-engine checkout "${UE5_BRANCH}"
        git -C unreal-engine reset --hard "origin/${UE5_BRANCH}"
      fi

      cd unreal-engine
      ./Setup.sh
      ./GenerateProjectFiles.sh
      make
      EOF
  variables:
    log_file: build_log_unreal.txt

build-carla:
  stage: Build Carla
  extends:
    - .build
    - .docker-run-ue5
  needs: ["install-unreal-engine"]
  resource_group: ue5-engine
  script:
    - |
      set -e

      docker volume rm "$CARLA_SRC_VOLUME" || true
      docker volume create "$CARLA_SRC_VOLUME"

      docker run --rm \
        --user root \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla" \
        alpine sh -c "chown ${CARLA_DOCKER_UID}:${CARLA_DOCKER_GID} /workspaces/carla"

      tar -C "$CI_PROJECT_DIR" -cf - . | docker run --rm -i \
        --user "${CARLA_DOCKER_UID}:${CARLA_DOCKER_GID}" \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla" \
        alpine sh -c 'cd /workspaces/carla && tar -xf -'

      docker run --rm -i \
        $DOCKER_RUN_FLAGS \
        --user carla \
        --workdir /workspaces/carla \
        --env=CARLA_UNREAL_ENGINE_PATH=/workspaces/unreal-engine \
        --env=CARLA_CONTENT_BRANCH="$CARLA_CONTENT_BRANCH" \
        --env=CI_JOB_TOKEN="$CI_JOB_TOKEN" \
        --env=NVIDIA_VISIBLE_DEVICES=all \
        --env=NVIDIA_DRIVER_CAPABILITIES=all \
        --volume "$UE_VOLUME:/workspaces/unreal-engine" \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla" \
        carla-development:ue5-${UBUNTU_DISTRO} \
        bash --noprofile --norc -eo pipefail > build_log_carla.txt 2>&1 <<'EOF'

      mkdir -p Unreal/CarlaUnreal/Content
      rm -rf Unreal/CarlaUnreal/content-openads
      git clone -b ue5-dev --depth 1 https://bitbucket.org/carla-simulator/carla-content.git Unreal/CarlaUnreal/Content/Carla

      git clone \
        --single-branch --depth 1 -b "${CARLA_CONTENT_BRANCH}" \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ika.rwth-aachen.de/fb-fi/simulation/carla/carla-content.git" \
        Unreal/CarlaUnreal/content-openads
      cp -a Unreal/CarlaUnreal/content-openads/Carla/. Unreal/CarlaUnreal/Content/Carla/

      cmake --preset Release -DENABLE_ROS2=ON -DBUILD_LIBCARLA_TESTS=ON

      cmake --build Build/Release --target carla-client
      cmake --build Build/Release --target carla-python-api
      cmake --build Build/Release --target carla-server

      cmake --build Build/Release --target libcarla_test_server
      cmake --build Build/Release --target libcarla_test_client

      rm -rf Build/test-content
      git clone --depth 1 -b 0.1.4 https://github.com/carla-simulator/opendrive-test-files.git Build/test-content

      #./Build/Release/LibCarla/libcarla_test_server
      #./Build/Release/LibCarla/libcarla_test_client

      cmake --build Build/Release --target package
      EOF

      PACKAGE_FILE="Carla-${carla_version}-Linux-Shipping.tar.gz"

      docker run --rm \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla:ro" \
        alpine sh -c "ls -lh /workspaces/carla/Build/Release/Package && test -f /workspaces/carla/Build/Release/Package/$PACKAGE_FILE"
  variables:
    log_file: build_log_carla.txt

build-client-docker-image:
  stage: Build Client Docker Image
  extends: .build
  needs:
    - job: build-carla
      artifacts: false
  variables:
    log_file: build_log_client_image.txt
  script:
    - |
      set -e
      rm -rf artifacts
      mkdir -p artifacts
      cp -a PythonAPI artifacts/PythonAPI

      PACKAGE_COPY_CONTAINER="carla-client-copy-${CI_JOB_ID}"
      docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null 2>&1 || true
      docker run -d \
        --name "$PACKAGE_COPY_CONTAINER" \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla:ro" \
        alpine sleep infinity >/dev/null
      trap 'docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null 2>&1 || true' EXIT

      if ! docker cp \
        "$PACKAGE_COPY_CONTAINER:/workspaces/carla/Build/Release/PythonAPI/dist" \
        artifacts/PythonAPI/carla/dist; then
        echo "No Python dist folder found in CARLA source volume " >&2
        docker exec "$PACKAGE_COPY_CONTAINER" sh -c 'ls -lh /workspaces/carla/Build/Release/PythonAPI || true'
        exit 1
      fi

      docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null
      trap - EXIT

      docker build \
        --build-arg UBUNTU_DISTRO=$UBUNTU_DISTRO \
        -t ${image_carla_client}_ci_${CI_COMMIT_REF_SLUG} \
        -f "Util/Docker/client/Client.Dockerfile" \
        . > build_log_client_image.txt 2>&1
  artifacts:
    name: "$CI_JOB_NAME"
    when: always
    paths:
      - build_log_client_image.txt
      - artifacts/PythonAPI
    expire_in: never


build-release-docker-image:
  stage: Build Release Docker Image
  extends: .build
  needs:
    - job: build-carla
      artifacts: false
  script:
    - |
      set -e
      rm -rf docker-release-context
      mkdir docker-release-context

      PACKAGE_FILE="Carla-${carla_version}-Linux-Shipping.tar.gz"
      PACKAGE_COPY_CONTAINER="carla-release-package-copy-${CI_JOB_ID}"
      docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null 2>&1 || true
      docker run -d \
        --name "$PACKAGE_COPY_CONTAINER" \
        --volume "$CARLA_SRC_VOLUME:/workspaces/carla:ro" \
        alpine sleep infinity >/dev/null
      trap 'docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null 2>&1 || true' EXIT

      if ! docker cp \
        "$PACKAGE_COPY_CONTAINER:/workspaces/carla/Build/Release/Package/$PACKAGE_FILE" \
        "$PACKAGE_FILE"; then
        echo "No Linux package found in CARLA source volume at /workspaces/carla/Build/Release/Package/$PACKAGE_FILE." >&2
        docker exec "$PACKAGE_COPY_CONTAINER" sh -c 'ls -lh /workspaces/carla/Build/Release/Package || true'
        exit 1
      fi

      docker rm -f "$PACKAGE_COPY_CONTAINER" >/dev/null
      trap - EXIT

      tar -xzf "$PACKAGE_FILE" -C docker-release-context

      PACKAGE_ROOT="docker-release-context/Carla-${carla_version}-Linux-Shipping"
      if [ ! -f "$PACKAGE_ROOT/Dockerfile" ]; then
        echo "Expected Dockerfile not found at $PACKAGE_ROOT/Dockerfile." >&2
        find docker-release-context -maxdepth 3 -type f -name Dockerfile -print || true
        exit 1
      fi

      ls -lh "$PACKAGE_ROOT"
      docker build \
        --build-arg UBUNTU_DISTRO=$UBUNTU_DISTRO \
        -t ${image_carla_release}_ci_${CI_COMMIT_REF_SLUG} \
        -f "$PACKAGE_ROOT/Dockerfile" \
        "$PACKAGE_ROOT" > build_log_release_image.txt 2>&1
  variables:
    log_file: build_log_release_image.txt

.push:
  stage: Push Docker Images
  interruptible: true
  tags:
    - rhea1
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export image_publish_postfix=$CI_COMMIT_TAG
      elif [ "$CI_COMMIT_BRANCH" = "ue5-ika" ]; then
        export image_publish_postfix=latest
      else
        export image_publish_postfix=${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHORT_SHA}
      fi

push-release-docker-image:
  extends: .push
  needs: ["build-release-docker-image"]
  script:
    - docker tag ${image_carla_release}_ci_${CI_COMMIT_REF_SLUG} ${image_carla_release}_$image_publish_postfix
    - docker push ${image_carla_release}_$image_publish_postfix

push-client-docker-image:
  extends: .push
  needs: ["build-client-docker-image"]
  script:
    - docker tag ${image_carla_client}_ci_${CI_COMMIT_REF_SLUG} ${image_carla_client}_$image_publish_postfix
    - docker push ${image_carla_client}_$image_publish_postfix

clean-up:
  stage: Clean Up
  tags:
    - rhea1
  # Use `when: always` temporarily when failed jobs should also clean runner resources.
  # when: always
  when: on_success
  script:
    - docker rmi ${image_carla_release}_ci_${CI_COMMIT_REF_SLUG} || echo "Image ${image_carla_release}_ci_${CI_COMMIT_REF_SLUG} does not exist."
    - docker volume rm "$CARLA_SRC_VOLUME" || echo "Volume $CARLA_SRC_VOLUME does not exist."
    - rm -rf docker-release-context
