on:
  workflow_call:
    inputs:
      python-versions:
        required: true
        type: string
      smoke-test-python-versions:
        type: string
        required: true
      additional-args:
        type: string
        required: false
        default: ""
      additional-maps:
        type: boolean
        default: true
      upload-package:
        type: boolean
        required: true
      upload-replace-latest:
        type: boolean
        required: true
      upload-docker:
        type: boolean
        required: true
      content-overlay:
        type: boolean
        default: false
      content-overlay-repository:
        type: string
        default: "https://gitlab.ika.rwth-aachen.de/fb-fi/simulation/carla/carla-content"
      content-overlay-branch:
        type: string
        default: "ue5"
      unreal-engine-branch:
        type: string
        default: "ue5-dev-carla"
      docker-image-repository:
        type: string
        default: "ghcr.io/rwthika/carla-simulator"

    secrets:
      GITLAB_CONTENT_USERNAME:
        required: false
      GITLAB_CONTENT_TOKEN:
        required: false
      UE_GITHUB_USERNAME:
        required: false
      UE_GITHUB_TOKEN:
        required: false

jobs:
  ubuntu:
    name: Ubuntu CI/CD
    defaults:
      run:
        shell: bash -leo pipefail {0}
    runs-on: self-hosted:ubuntu-gpu
    timeout-minutes: 600
    env:
      UBUNTU_DISTRO: "22.04"
      UE5_BRANCH: ${{ inputs.unreal-engine-branch }}
      CARLA_UNREAL_ENGINE_HOST_PATH: /work/unreal-engine
      CARLA_UNREAL_ENGINE_PATH: /workspaces/unreal-engine
      CARLA_DOCKER_IMAGE: carla-development:ue5-22.04
      CARLA_DOCKER_UID: "1000"
      CARLA_DOCKER_GID: "1000"
      CARLA_DOCKER_GROUP_GID: "999"
      CARLA_DOCKER_RUN_FLAGS: >-
        --rm
        --gpus all
        --net=host
        --env NVIDIA_VISIBLE_DEVICES=all
        --env NVIDIA_DRIVER_CAPABILITIES=all
        --env CARLA_UNREAL_ENGINE_PATH=/workspaces/unreal-engine
        --volume /work/unreal-engine:/workspaces/unreal-engine

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CARLA development image
        run: |
          HOST_UID="$(id -u)"
          HOST_GID="$(id -g)"
          if [ "$HOST_UID" = "0" ]; then
            HOST_UID="$CARLA_DOCKER_UID"
            HOST_GID="$CARLA_DOCKER_GID"
          fi

          DOCKER_GROUP_GID="$(getent group docker | cut -d: -f3 || true)"
          if [ -z "$DOCKER_GROUP_GID" ]; then
            DOCKER_GROUP_GID="$CARLA_DOCKER_GROUP_GID"
          fi

          bash Util/Docker/build.sh \
            --ubuntu-distro "$UBUNTU_DISTRO" \
            --user "${HOST_UID}:${HOST_GID}" \
            --docker-gid "$DOCKER_GROUP_GID"

      - name: Prepare Unreal Engine
        env:
          UE_GITHUB_USERNAME: ${{ secrets.UE_GITHUB_USERNAME }}
          UE_GITHUB_TOKEN: ${{ secrets.UE_GITHUB_TOKEN }}
        run: |
          mkdir -p "$CARLA_UNREAL_ENGINE_HOST_PATH"

          docker run $CARLA_DOCKER_RUN_FLAGS \
            --env UE5_BRANCH="$UE5_BRANCH" \
            --env UE_GITHUB_USERNAME="$UE_GITHUB_USERNAME" \
            --env UE_GITHUB_TOKEN="$UE_GITHUB_TOKEN" \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cd /workspaces

          find_unreal_clang_sysroot() {
            find \
              "${CARLA_UNREAL_ENGINE_PATH}/Engine/Extras/ThirdPartyNotUE/SDKs/HostLinux/Linux_x64" \
              -mindepth 2 \
              -maxdepth 2 \
              -type d \
              -name "*unknown-linux-*" \
              -print \
              -quit 2>/dev/null
          }

          if [ -d unreal-engine/.git ]; then
            git -C unreal-engine fetch origin "${UE5_BRANCH}"
            git -C unreal-engine checkout "${UE5_BRANCH}"
            git -C unreal-engine reset --hard "origin/${UE5_BRANCH}"
          elif [ -f unreal-engine/Setup.sh ]; then
            echo "Using existing Unreal Engine source tree at ${CARLA_UNREAL_ENGINE_PATH}."
          elif [ -z "$(find unreal-engine -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
            if [ -z "${UE_GITHUB_USERNAME}" ] || [ -z "${UE_GITHUB_TOKEN}" ]; then
              echo "Missing UE_GITHUB_USERNAME/UE_GITHUB_TOKEN for Unreal Engine clone."
              exit 1
            fi
            git clone -b "${UE5_BRANCH}" "https://${UE_GITHUB_USERNAME}:${UE_GITHUB_TOKEN}@github.com/CarlaUnreal/UnrealEngine.git" unreal-engine
          elif [ -z "$(find_unreal_clang_sysroot)" ]; then
            echo "Unreal Engine exists at ${CARLA_UNREAL_ENGINE_PATH}, but its clang sysroot is missing."
            echo "Provide a complete UE checkout or make the directory empty so CI can clone and prepare it."
            exit 1
          fi

          cd unreal-engine

          if [ -z "$(find_unreal_clang_sysroot)" ]; then
            ./Setup.sh
          fi

          ./GenerateProjectFiles.sh

          if [ ! -x Engine/Binaries/Linux/UnrealEditor ]; then
            make
          fi
          '

      - name: Download content
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          git clone -b ue5-dev --depth 1 --config filter.lfs.required=false https://bitbucket.org/carla-simulator/carla-content.git Unreal/CarlaUnreal/Content/Carla
          '

      - name: Download and merge OpenADS content
        if: inputs.content-overlay == true
        env:
          GITLAB_CONTENT_USERNAME: ${{ secrets.GITLAB_CONTENT_USERNAME }}
          GITLAB_CONTENT_TOKEN: ${{ secrets.GITLAB_CONTENT_TOKEN }}
          CARLA_CONTENT_REPOSITORY: ${{ inputs.content-overlay-repository }}
          CARLA_CONTENT_BRANCH: ${{ inputs.content-overlay-branch }}
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --env GITLAB_CONTENT_USERNAME="$GITLAB_CONTENT_USERNAME" \
            --env GITLAB_CONTENT_TOKEN="$GITLAB_CONTENT_TOKEN" \
            --env CARLA_CONTENT_REPOSITORY="$CARLA_CONTENT_REPOSITORY" \
            --env CARLA_CONTENT_BRANCH="$CARLA_CONTENT_BRANCH" \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          rm -rf Unreal/CarlaUnreal/content-openads
          content_auth_header="$(printf '%s:%s' "$GITLAB_CONTENT_USERNAME" "$GITLAB_CONTENT_TOKEN" | base64 | tr -d '\n')"
          git -c http.extraHeader="Authorization: Basic ${content_auth_header}" \
            clone --single-branch --depth 1 -b "$CARLA_CONTENT_BRANCH" \
            "$CARLA_CONTENT_REPOSITORY" \
            Unreal/CarlaUnreal/content-openads
          unset content_auth_header
          python3 Util/SetupUtils/MergeContentOverlay.py \
            --base Unreal/CarlaUnreal/Content/Carla \
            --overlay Unreal/CarlaUnreal/content-openads/Carla
          '

      - name: Preset
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --preset Release -DENABLE_ROS2=ON -DBUILD_LIBCARLA_TESTS=ON
          '

      - name: Build LibCarla
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --build Build/Release --target carla-client
          '

      - name: Build PythonAPI
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --build Build/Release --target carla-python-api
          '

      - name: Build CarlaServer
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --build Build/Release --target carla-server
          '

      - name: Build LibCarla Tests
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --build Build/Release --target libcarla_test_server
          cmake --build Build/Release --target libcarla_test_client
          '

      - name: Fetch LibCarla test content
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          rm -rf Build/test-content
          git clone --depth 1 -b 0.1.4 https://github.com/carla-simulator/opendrive-test-files.git Build/test-content
          '

      - name: Run LibCarla Tests
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          ./Build/Release/LibCarla/libcarla_test_server
          ./Build/Release/LibCarla/libcarla_test_client
          '

      - name: Build Package
        run: |
          docker run $CARLA_DOCKER_RUN_FLAGS \
            --volume "$GITHUB_WORKSPACE:/workspaces/carla" \
            --workdir /workspaces/carla \
            --user carla \
            "$CARLA_DOCKER_IMAGE" \
            bash -leo pipefail -c '
          cmake --build Build/Release --target package
          '

      - name: Prepare publish artifacts
        if: inputs.upload-docker == true || inputs.upload-package == true
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          cp -a PythonAPI artifacts/PythonAPI
          mkdir -p artifacts/PythonAPI/carla
          rm -rf artifacts/PythonAPI/carla/dist
          cp -a Build/Release/PythonAPI/dist artifacts/PythonAPI/carla/dist
          cp -a Build/Release/Package/*.tar.gz artifacts/

      - name: Upload Docker artifacts
        if: inputs.upload-docker == true
        uses: actions/upload-artifact@v4
        with:
          name: ue5-docker-artifacts
          path: |
            artifacts/PythonAPI
            artifacts/*.tar.gz

      - name: Prepare GitHub package release
        if: inputs.upload-package == true
        id: package_release
        run: |
          package_file="$(find artifacts -maxdepth 1 -name 'Carla-*-Linux-Shipping.tar.gz' -print -quit)"
          test -n "$package_file"

          rm -rf github-package
          mkdir -p github-package

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
            release_name="$GITHUB_REF_NAME"
            asset_name="$(basename "$package_file")"
          elif [ "${{ inputs.upload-replace-latest }}" = "true" ]; then
            ref_slug="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
            release_tag="${ref_slug}-latest"
            release_name="${GITHUB_REF_NAME} latest"
            asset_name="CARLA_UE5_Latest.tar.gz"
          else
            ref_slug="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
            release_tag="${ref_slug}-${GITHUB_SHA::8}"
            release_name="$release_tag"
            asset_name="$(basename "$package_file")"
          fi

          cp "$package_file" "github-package/$asset_name"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Upload package to GitHub Releases
        if: inputs.upload-package == true
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ steps.package_release.outputs.release_tag }}
          commit: ${{ github.sha }}
          name: ${{ steps.package_release.outputs.release_name }}
          artifacts: github-package/*.tar.gz
          token: ${{ github.token }}

      - name: Write summary
        if: inputs.upload-package == true
        run: |
          echo "## [Ubuntu] CARLA UE5 CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- CARLA Package: ${{ steps.package_release.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Images
    if: inputs.upload-docker == true
    needs: ubuntu
    runs-on: self-hosted:ubuntu-gpu
    timeout-minutes: 600
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Docker workspace
        run: |
          rm -rf artifacts docker-release-context

      - name: Download Docker artifacts
        uses: actions/download-artifact@v4
        with:
          name: ue5-docker-artifacts
          path: artifacts

      - name: Set image tag
        id: image_tag
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            image_publish_postfix="$GITHUB_REF_NAME"
          elif [ "$GITHUB_REF_NAME" = "ue5-ika" ]; then
            image_publish_postfix="latest"
          else
            ref_slug="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
            image_publish_postfix="${ref_slug}_${GITHUB_SHA::8}"
          fi
          image_repository="$(printf '%s' '${{ inputs.docker-image-repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "postfix=${image_publish_postfix}" >> "$GITHUB_OUTPUT"
          echo "repository=${image_repository}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Util/Docker/client/Client.Dockerfile
          tags: ${{ steps.image_tag.outputs.repository }}:client_${{ steps.image_tag.outputs.postfix }}
          push: true

      - name: Prepare release Docker context
        id: release_context
        run: |
          package_file="$(find artifacts -maxdepth 1 -name 'Carla-*-Linux-Shipping.tar.gz' -print -quit)"
          test -n "$package_file"
          rm -rf docker-release-context
          mkdir -p docker-release-context
          tar -xzf "$package_file" -C docker-release-context
          package_root="$(find docker-release-context -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -f "$package_root/Dockerfile"
          echo "package_root=$package_root" >> "$GITHUB_OUTPUT"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.release_context.outputs.package_root }}
          file: ${{ steps.release_context.outputs.package_root }}/Dockerfile
          tags: ${{ steps.image_tag.outputs.repository }}:release_${{ steps.image_tag.outputs.postfix }}
          push: true
          build-args: |
            UBUNTU_DISTRO=22.04
